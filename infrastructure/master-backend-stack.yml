AWSTemplateFormatVersion: "2010-09-09"
Description: Karaadi Elastic Beanstalk Stack (reuses existing VPC/RDS/Redis)

Parameters:
  AppName:
    Type: String
    Default: karaadi

  VpcId:
    Type: String
    Default: vpc-0f79ad5eec7d93d64
  ExistingPublicSubnetId:
    Type: String
    Default: subnet-053b339f6291b582d
  PrivateSubnet1Id:
    Type: String
    Default: subnet-084580d7cb9b7a892
  PrivateSubnet2Id:
    Type: String
    Default: subnet-04cd77afc1a7a0561
  PublicRouteTableId:
    Type: String
    Default: rtb-00be7f6ed797b47c8
  ExistingRDSSecurityGroupId:
    Type: String
    Default: sg-009778749a1df93c6
  ExistingRedisSecurityGroupId:
    Type: String
    Default: sg-073285e2466a649d6

  DatabaseUrl:
    Type: String
    NoEcho: true
  RedisUrl:
    Type: String
    NoEcho: true
  JWTSecret:
    Type: String
    NoEcho: true
  SessionSecret:
    Type: String
    NoEcho: true
  EncryptionKey:
    Type: String
    NoEcho: true
  WaafiPayApiKey:
    Type: String
    NoEcho: true
    Default: API-Q9yhd1f89hJLeXV8lq78hEZaS5CP
  TikTokClientSecret:
    Type: String
    NoEcho: true
    Default: 6LXGWoVsW8apQBthEOO5jivtbigGXubz

  EBSolutionStackName:
    Type: String
    Default: "64bit Amazon Linux 2023 v6.4.1 running Node.js 20"
  InstanceType:
    Type: String
    Default: t3.small

Resources:
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: eu-west-1b
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-public-b"

  PublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTableId

  EBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Karaadi EB instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 9000
          ToPort: 9000
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-eb-sg"

  RDSIngressFromEB:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ExistingRDSSecurityGroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref EBSecurityGroup

  RedisIngressFromEB:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ExistingRedisSecurityGroupId
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref EBSecurityGroup

  # ══════════════════════════════════════════════════════════════════════════
  # S3 Artifacts Bucket
  # ══════════════════════════════════════════════════════════════════════════

  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AppName}-eb-artifacts-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-deploys
            Status: Enabled
            ExpirationInDays: 30

  # ══════════════════════════════════════════════════════════════════════════
  # IAM — EC2 Instance Profile for EB
  # ══════════════════════════════════════════════════════════════════════════

  EBInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-eb-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWebTier
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: s3-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"]
                Resource:
                  - arn:aws:s3:::karaadi-images-108782100045/*
                  - !Sub "arn:aws:s3:::${AppName}-eb-artifacts-${AWS::AccountId}/*"
              - Effect: Allow
                Action: "s3:ListBucket"
                Resource:
                  - arn:aws:s3:::karaadi-images-108782100045
                  - !Sub "arn:aws:s3:::${AppName}-eb-artifacts-${AWS::AccountId}"
        - PolicyName: cognito-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminDeleteUser
                Resource: "*"
        - PolicyName: ses-send
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ["ses:SendEmail", "ses:SendRawEmail"]
                Resource: "*"
        - PolicyName: cloudwatch-logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  [
                    "logs:CreateLogGroup",
                    "logs:CreateLogStream",
                    "logs:PutLogEvents",
                  ]
                Resource: "*"

  EBInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AppName}-eb-instance-profile"
      Roles:
        - !Ref EBInstanceRole

  # ══════════════════════════════════════════════════════════════════════════
  # Elastic Beanstalk
  # ══════════════════════════════════════════════════════════════════════════

  EBApplication:
    Type: AWS::ElasticBeanstalk::Application
    Properties:
      ApplicationName: !Sub "${AppName}-app"

  EBConfigTemplate:
    Type: AWS::ElasticBeanstalk::ConfigurationTemplate
    Properties:
      ApplicationName: !Ref EBApplication
      SolutionStackName: !Ref EBSolutionStackName
      OptionSettings:
        - Namespace: aws:ec2:vpc
          OptionName: VPCId
          Value: !Ref VpcId
        - Namespace: aws:ec2:vpc
          OptionName: Subnets
          Value: !Join [",", [!Ref PrivateSubnet1Id, !Ref PrivateSubnet2Id]]
        - Namespace: aws:ec2:vpc
          OptionName: ELBSubnets
          Value: !Join [",", [!Ref ExistingPublicSubnetId, !Ref PublicSubnet2]]
        - Namespace: aws:ec2:vpc
          OptionName: AssociatePublicIpAddress
          Value: "false"

        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: IamInstanceProfile
          Value: !Ref EBInstanceProfile
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: InstanceType
          Value: !Ref InstanceType
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: SecurityGroups
          Value: !Ref EBSecurityGroup
        - Namespace: aws:autoscaling:asg
          OptionName: MinSize
          Value: "1"
        - Namespace: aws:autoscaling:asg
          OptionName: MaxSize
          Value: "2"
        - Namespace: aws:elasticbeanstalk:command
          OptionName: DeploymentPolicy
          Value: Rolling
        - Namespace: aws:elasticbeanstalk:command
          OptionName: BatchSizeType
          Value: Fixed
        - Namespace: aws:elasticbeanstalk:command
          OptionName: BatchSize
          Value: "1"
        - Namespace: aws:elasticbeanstalk:healthreporting:system
          OptionName: SystemType
          Value: enhanced
        - Namespace: aws:elasticbeanstalk:container:nodejs
          OptionName: NodeCommand
          Value: "node --loader ts-node/esm -r tsconfig-paths/register src/server.ts"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: NODE_ENV
          Value: production
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: PORT
          Value: "9000"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DATABASE_URL
          Value: !Ref DatabaseUrl
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: REDIS_URL
          Value: !Ref RedisUrl
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: JWT_SECRET
          Value: !Ref JWTSecret
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: SESSION_SECRET
          Value: !Ref SessionSecret
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: ENCRYPTION_KEY
          Value: !Ref EncryptionKey
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: KARAADI_AWS_COGNITO_USER_POOL_ID
          Value: eu-west-1_mmyv1vz45
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: KARAADI_AWS_COGNITO_CLIENT_ID
          Value: 29lcmo54mlc692mbsf26j07g7p
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: COGNITO_JWKS_URL
          Value: "https://cognito-idp.eu-west-1.amazonaws.com/eu-west-1_mmyv1vz45/.well-known/jwks.json"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: WAAFIPAY_API_KEY
          Value: !Ref WaafiPayApiKey
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: WAAFIPAY_API_USER_ID
          Value: "1008816"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: WAAFIPAY_MERCHANT_UID
          Value: M0914229
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: USE_WAAFIPAY_PROD
          Value: "true"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: WAAFIPAY_PRODUCTION_URL
          Value: "https://api.waafipay.net/asm"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: TIKTOK_CLIENT_KEY
          Value: aw7w2mc71navvwzl
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: TIKTOK_CLIENT_SECRET
          Value: !Ref TikTokClientSecret
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: FACEBOOK_PAGE_ID
          Value: "61569249207022"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: S3_BUCKET_NAME
          Value: karaadi-images-108782100045
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: S3_BUCKET_URL
          Value: "https://karaadi-images-108782100045.s3.eu-west-1.amazonaws.com"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: ALLOWED_ORIGINS
          Value: "https://karaadi.com,https://www.karaadi.com"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: BACKEND_URL
          Value: "https://api.karaadi.com"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: COOKIE_DOMAIN
          Value: karaadi.com
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: AWS_REGION
          Value: eu-west-1
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: PG_POOL_MAX
          Value: "20"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: PAYLOAD_LIMIT
          Value: 20mb

  EBEnvironment:
    Type: AWS::ElasticBeanstalk::Environment
    Properties:
      EnvironmentName: !Sub "${AppName}-env"
      ApplicationName: !Ref EBApplication
      TemplateName: !Ref EBConfigTemplate
      Tier:
        Name: WebServer
        Type: Standard

Outputs:
  EBApplicationName:
    Value: !Ref EBApplication
    Export:
      Name: !Sub "${AppName}-EBApplicationName"

  EBEnvironmentName:
    Value: !Sub "${AppName}-env"
    Export:
      Name: !Sub "${AppName}-EBEnvironmentName"

  EBEnvironmentURL:
    Value: !Sub "http://${EBEnvironment.EndpointURL}"
    Export:
      Name: !Sub "${AppName}-EBEnvironmentURL"

  ArtifactsBucketName:
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub "${AppName}-ArtifactsBucketName"
