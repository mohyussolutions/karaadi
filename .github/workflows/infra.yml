name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infrastructure/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: deploy
        type: choice
        options: [deploy, destroy]

concurrency:
  group: infrastructure
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1
  STACK_NAME: karaadi-production
  DB_USERNAME: karaadi_admin
  # Set to your apex domain once DNS is ready (e.g. karaadi.com), or leave empty
  DOMAIN_NAME: ""

jobs:
  # ── Validate ─────────────────────────────────────────────────────────────────
  lint:
    name: Validate Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cfn-lint
        run: pip install cfn-lint --quiet

      - name: Lint CloudFormation template
        run: cfn-lint infrastructure/production.yaml --format json

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Stack
    runs-on: ubuntu-latest
    needs: lint
    if: github.event.inputs.action != 'destroy'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve parameters
        id: params
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "github_org=${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
          echo "github_repo=$REPO_NAME" >> "$GITHUB_OUTPUT"

          DOMAIN="${DOMAIN_NAME:-example.com}"
          [ -z "$DOMAIN" ] && DOMAIN="example.com"
          echo "domain=$DOMAIN" >> "$GITHUB_OUTPUT"

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/production.yaml \
            --stack-name "$STACK_NAME" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              GitHubOrg="${{ steps.params.outputs.github_org }}" \
              GitHubRepo="${{ steps.params.outputs.github_repo }}" \
              DBUsername="$DB_USERNAME" \
              DBPassword="${{ secrets.DB_PASSWORD }}" \
              DomainName="${{ steps.params.outputs.domain }}" \
            --no-fail-on-empty-changeset \
            --region "$AWS_REGION"

      - name: Capture and display stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs" \
            --output json | tee infrastructure/outputs.json

          echo ""
          echo "=== Stack Outputs ==="
          jq -r '.[] | "\(.OutputKey): \(.OutputValue)"' infrastructure/outputs.json

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: stack-outputs
          path: infrastructure/outputs.json
          retention-days: 90

  # ── Destroy ──────────────────────────────────────────────────────────────────
  destroy:
    name: Destroy Stack
    runs-on: ubuntu-latest
    needs: lint
    if: github.event.inputs.action == 'destroy'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete stack
        run: |
          echo "Deleting $STACK_NAME …"
          aws cloudformation delete-stack \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION"

          echo "Waiting for deletion (RDS creates a final snapshot — may take 10–15 min)…"
          aws cloudformation wait stack-delete-complete \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION"

          echo "Stack deleted."
