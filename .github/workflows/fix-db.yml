name: Fix DB / Seed Data

on:
  workflow_dispatch:
    inputs:
      db_master_password:
        description: "RDS master password"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  STACK_NAME: karaadi-production
  BACKEND_ROLE: arn:aws:iam::108782100045:role/karaadi-backend-deploy

jobs:
  fix-db:
    name: Fix DATABASE_URL and seed
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BACKEND_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Store password and patch SSM env
        env:
          DB_PASS: ${{ github.event.inputs.db_master_password }}
        run: |
          set -euo pipefail

          RDS_HOST=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='RDSEndpoint'].OutputValue" \
            --output text)
          echo "RDS: $RDS_HOST"

          aws ssm put-parameter --name /karaadi/db-master-password \
            --value "$DB_PASS" --type SecureString --overwrite --region "$AWS_REGION"

          CURRENT=$(aws ssm get-parameter --name /karaadi/backend/env \
            --with-decryption --query Parameter.Value --output text --region "$AWS_REGION")

          export NEW_DB_LINE="DATABASE_URL=postgresql://karaadi_admin:${DB_PASS}@${RDS_HOST}:5432/karaadi?connection_limit=20&pool_timeout=20"
          UPDATED=$(printf '%s' "$CURRENT" | python3 -c \
            'import sys,os,re;c=sys.stdin.read();l=os.environ["NEW_DB_LINE"];p=re.compile(r"^DATABASE_URL=.*",re.MULTILINE);print(p.sub(l,c) if p.search(c) else c.rstrip()+"\n"+l,end="")')

          aws ssm put-parameter --name /karaadi/backend/env --value "$UPDATED" \
            --type SecureString --overwrite --region "$AWS_REGION"
          echo "SSM updated"

      - name: Get ASG name
        id: cfn
        run: |
          ASG=$(aws cloudformation describe-stack-resources \
            --stack-name "$STACK_NAME" \
            --logical-resource-id BackendAutoScalingGroup \
            --region "$AWS_REGION" \
            --query "StackResources[0].PhysicalResourceId" \
            --output text)
          echo "asg=$ASG" >> "$GITHUB_OUTPUT"

      - name: Seed and restart on all instances
        env:
          ASG: ${{ steps.cfn.outputs.asg }}
        run: |
          set -euo pipefail

          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG" --region "$AWS_REGION" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          FIRST=$(echo "$INSTANCES" | awk '{print $1}')

          SEED_COMMANDS=$(jq -nc '[
            "set -euo pipefail",
            "cd /home/ec2-user/karaadi/backend",
            "echo Running npm run import on production...",
            "node --env-file=.env dist/seed.js && echo SEED_OK || echo SEED_FAILED",
            "pm2 restart karaadi-backend --update-env",
            "sleep 5 && curl -sf http://localhost:8080/health && echo HEALTH_OK"
          ]')

          RESTART_COMMANDS=$(jq -nc '[
            "pm2 restart karaadi-backend --update-env",
            "sleep 5 && curl -sf http://localhost:8080/health && echo HEALTH_OK"
          ]')

          run_ssm() {
            local INSTANCE=$1
            local CMDS=$2
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --comment "fix-db-seed" \
              --parameters "{\"commands\":$CMDS,\"executionTimeout\":[\"180\"]}" \
              --region "$AWS_REGION" \
              --output json | jq -r '.Command.CommandId')
            echo "SSM $CMD_ID on $INSTANCE"
            for i in $(seq 1 36); do
              INV=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE" \
                --region "$AWS_REGION" --output json 2>/dev/null \
                || echo '{"Status":"InProgress"}')
              STATUS=$(echo "$INV" | jq -r '.Status')
              echo "[$i] $STATUS"
              case "$STATUS" in
                Success) echo "$INV" | jq -r '.StandardOutputContent'; return 0 ;;
                Failed|Cancelled|TimedOut)
                  echo "$INV" | jq -r '.StandardOutputContent'
                  echo "$INV" | jq -r '.StandardErrorContent'
                  return 1 ;;
                *) sleep 5 ;;
              esac
            done
          }

          echo "=== Seeding on $FIRST ==="
          run_ssm "$FIRST" "$SEED_COMMANDS"

          for INSTANCE in $INSTANCES; do
            if [ "$INSTANCE" != "$FIRST" ]; then
              echo "=== Restarting $INSTANCE ==="
              run_ssm "$INSTANCE" "$RESTART_COMMANDS"
            fi
          done
          echo "Done."
