name: Fix DB / Seed Data

on:
  workflow_dispatch:
    inputs:
      db_master_password:
        description: "RDS master password"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-1
  STACK_NAME: karaadi-production
  BACKEND_ROLE: arn:aws:iam::108782100045:role/karaadi-backend-deploy

jobs:
  fix-db:
    name: Fix DATABASE_URL and seed
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BACKEND_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Store password and patch SSM env
        env:
          DB_PASS: ${{ github.event.inputs.db_master_password }}
        run: |
          set -euo pipefail

          RDS_HOST=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query "Stacks[0].Outputs[?OutputKey=='RDSEndpoint'].OutputValue" --output text)
          COGNITO_POOL=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolId'].OutputValue" --output text 2>/dev/null || echo "")
          COGNITO_CLIENT=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" --query "Stacks[0].Outputs[?OutputKey=='CognitoClientId'].OutputValue" --output text 2>/dev/null || echo "")
          echo "RDS: $RDS_HOST | Cognito Pool: $COGNITO_POOL | Client: $COGNITO_CLIENT"

          aws ssm put-parameter --name /karaadi/db-master-password --value "$DB_PASS" --type SecureString --tier Advanced --overwrite --region "$AWS_REGION"

          CURRENT=$(aws ssm get-parameter --name /karaadi/backend/env --with-decryption --query Parameter.Value --output text --region "$AWS_REGION")
          patch_env() { local key=$1 val=$2 content=$3; if echo "$content" | grep -q "^${key}="; then echo "$content" | sed "s|^${key}=.*|${key}=${val}|"; else printf '%s\n%s=%s' "$content" "$key" "$val"; fi; }
          UPDATED="$CURRENT"
          UPDATED=$(patch_env "DATABASE_URL" "postgresql://karaadi_admin:${DB_PASS}@${RDS_HOST}:5432/karaadi?connection_limit=20&pool_timeout=20" "$UPDATED")
          UPDATED=$(patch_env "ALLOWED_ORIGINS" "https://karaadi.com,https://www.karaadi.com" "$UPDATED")
          [ -n "$COGNITO_POOL" ] && UPDATED=$(patch_env "KARAADI_AWS_COGNITO_USER_POOL_ID" "$COGNITO_POOL" "$UPDATED")
          [ -n "$COGNITO_CLIENT" ] && UPDATED=$(patch_env "KARAADI_AWS_COGNITO_CLIENT_ID" "$COGNITO_CLIENT" "$UPDATED")

          aws ssm put-parameter --name /karaadi/backend/env --value "$UPDATED" --type SecureString --tier Advanced --overwrite --region "$AWS_REGION"
          echo "SSM updated"

      - name: Get ASG name
        id: cfn
        run: |
          ASG=$(aws cloudformation describe-stack-resources \
            --stack-name "$STACK_NAME" \
            --logical-resource-id BackendAutoScalingGroup \
            --region "$AWS_REGION" \
            --query "StackResources[0].PhysicalResourceId" \
            --output text)
          echo "asg=$ASG" >> "$GITHUB_OUTPUT"

      - name: Seed and restart on all instances
        env:
          ASG: ${{ steps.cfn.outputs.asg }}
        run: |
          set -euo pipefail

          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG" --region "$AWS_REGION" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          FIRST=$(echo "$INSTANCES" | awk '{print $1}')

          LATEST=$(aws s3 cp s3://karaadi-images-108782100045/deployments/backend-latest.tar.gz - \
            --region "$AWS_REGION" 2>/dev/null | wc -c || echo "0")
          S3_BUCKET="karaadi-images-108782100045"

          SEED_COMMANDS=$(jq -nc --arg bucket "$S3_BUCKET" --arg region "$AWS_REGION" '[
            "set -euo pipefail",
            "mkdir -p /home/ec2-user/karaadi/backend",
            ("aws ssm get-parameter --name /karaadi/backend/env --with-decryption --query Parameter.Value --output text --region " + $region + " > /home/ec2-user/karaadi/backend/.env || exit 1"),
            "[ -s /home/ec2-user/karaadi/backend/.env ] || exit 1",
            "cp /home/ec2-user/karaadi/backend/.env /home/ec2-user/karaadi/backend/.env.production",
            "if [ ! -f /home/ec2-user/karaadi/backend/dist/index.js ]; then",
            ("aws s3 cp s3://" + $bucket + "/deployments/backend-latest.tar.gz /tmp/backend.tar.gz --region " + $region),
            "rm -rf /home/ec2-user/karaadi/backend/src/prisma",
            "tar -xzf /tmp/backend.tar.gz -C /home/ec2-user/karaadi/backend",
            "cd /home/ec2-user/karaadi/backend && npm ci --omit=dev",
            "cd /home/ec2-user/karaadi/backend && npx prisma generate",
            "fi",
            "cd /home/ec2-user/karaadi/backend && npx prisma migrate deploy",
            "node --env-file=/home/ec2-user/karaadi/backend/.env /home/ec2-user/karaadi/backend/dist/seed.js && echo SEED_OK || echo SEED_FAILED",
            "pm2 delete karaadi-backend 2>/dev/null || true",
            "pm2 start /home/ec2-user/karaadi/backend/dist/index.js --name karaadi-backend --node-args \"--env-file=/home/ec2-user/karaadi/backend/.env\" --max-restarts 10 --restart-delay 3000",
            "pm2 save",
            "sleep 10; curl -s http://localhost:8080/health && echo HEALTH_OK; pm2 list"
          ]')

          RESTART_COMMANDS=$(jq -nc '[
            "pm2 restart karaadi-backend --update-env || true",
            "sleep 5; curl -s http://localhost:8080/health && echo HEALTH_OK"
          ]')

          run_ssm() {
            local INSTANCE=$1
            local CMDS=$2
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --comment "fix-db-seed" \
              --parameters "{\"commands\":$CMDS,\"executionTimeout\":[\"180\"]}" \
              --region "$AWS_REGION" \
              --output json | jq -r '.Command.CommandId')
            echo "SSM $CMD_ID on $INSTANCE"
            for i in $(seq 1 36); do
              INV=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE" \
                --region "$AWS_REGION" --output json 2>/dev/null \
                || echo '{"Status":"InProgress"}')
              STATUS=$(echo "$INV" | jq -r '.Status')
              echo "[$i] $STATUS"
              case "$STATUS" in
                Success) echo "$INV" | jq -r '.StandardOutputContent'; return 0 ;;
                Failed|Cancelled|TimedOut)
                  echo "$INV" | jq -r '.StandardOutputContent'
                  echo "$INV" | jq -r '.StandardErrorContent'
                  return 1 ;;
                *) sleep 5 ;;
              esac
            done
          }

          echo "=== Seeding on $FIRST ==="
          run_ssm "$FIRST" "$SEED_COMMANDS"

          for INSTANCE in $INSTANCES; do
            if [ "$INSTANCE" != "$FIRST" ]; then
              echo "=== Restarting $INSTANCE ==="
              run_ssm "$INSTANCE" "$RESTART_COMMANDS"
            fi
          done
          echo "Done."
