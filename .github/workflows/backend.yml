name: Backend — Build & Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Send deploy command via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy — ${{ github.sha }}" \
            --parameters '{"commands":[
              "set -e",
              "cd /home/ec2-user/karaadi",
              "git fetch origin main",
              "git reset --hard origin/main",
              "cd backend",
              "npm ci --omit=dev",
              "npm run build",
              "pm2 restart karaadi-backend --update-env || pm2 start dist/server.js --name karaadi-backend",
              "pm2 save"
            ]}' \
            --output text \
            --query "Command.CommandId")
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to finish
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true

      - name: Check deploy result
        run: |
          RESULT=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}")
          STATUS=$(echo "$RESULT" | jq -r '.Status')
          echo "SSM command status: $STATUS"
          echo "--- stdout ---"
          echo "$RESULT" | jq -r '.StandardOutputContent'
          echo "--- stderr ---"
          echo "$RESULT" | jq -r '.StandardErrorContent'
          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed"
            exit 1
          fi
