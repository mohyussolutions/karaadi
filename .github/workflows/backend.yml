name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Operation to perform"
        required: true
        type: choice
        options:
          - Deploy
          - Deploy-NoTests
          - Seed-Fix

concurrency:
  group: backend-${{ github.event.inputs.action || 'Deploy' }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  AWS_REGION: eu-west-1
  STACK_NAME: karaadi-master-backend

jobs:
  test:
    name: "Test & Type-check"
    if: github.event.inputs.action != 'Deploy-NoTests' && github.event.inputs.action != 'Seed-Fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: npx prisma generate --schema=./src/prisma

      - name: TypeScript type-check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: backend
        run: npm test

  build:
    name: "Build & Package"
    if: |
      always() &&
      github.event.inputs.action != 'Seed-Fix' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    needs: [test]
    runs-on: ubuntu-latest
    outputs:
      version_label: ${{ steps.label.outputs.version_label }}
      artifact_key: ${{ steps.label.outputs.artifact_key }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: npx prisma generate --schema=./src/prisma

      - name: TypeScript build
        working-directory: backend
        run: npx tsc --project tsconfig.json

      - name: Compute version label
        id: label
        run: |
          SHORT_SHA="${GITHUB_SHA:0:8}"
          TS="$(date -u +'%Y%m%dT%H%M%SZ')"
          VERSION="v${TS}-${SHORT_SHA}"
          echo "version_label=${VERSION}"  >> "$GITHUB_OUTPUT"
          echo "artifact_key=deployments/${VERSION}.zip" >> "$GITHUB_OUTPUT"
          echo "Version label: ${VERSION}"

      - name: Create deployment ZIP
        run: |
          cd backend
          zip -r ../backend-deploy.zip . \
            --exclude "node_modules/*" \
            --exclude ".git/*" \
            --exclude "*.test.ts" \
            --exclude "*.spec.ts" \
            --exclude "__tests__/*" \
            --exclude "jest.config.*" \
            --exclude "jest.setup.*" \
            --exclude ".env*" \
            --exclude "dist/*"
          echo "ZIP size: $(du -sh ../backend-deploy.zip | cut -f1)"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-deploy-zip
          path: backend-deploy.zip
          retention-days: 3

  deploy:
    name: "Deploy → Elastic Beanstalk"
    if: |
      always() &&
      github.event.inputs.action != 'Seed-Fix' &&
      needs.build.result == 'success'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate referenced AWS resources
        run: |
          set -euo pipefail
          FAILED=0
          check() {
            local label="$1" id="$2"
            shift 2
            val=$("$@" 2>/dev/null || echo "")
            if [ -z "$val" ] || [ "$val" = "None" ]; then
              echo "MISSING  $label: $id"
              FAILED=1
            else
              echo "OK       $label: $id"
            fi
          }
          check "VPC"              "vpc-0f79ad5eec7d93d64"     aws ec2 describe-vpcs           --vpc-ids              vpc-0f79ad5eec7d93d64     --region "$AWS_REGION" --query "Vpcs[0].VpcId"                --output text
          check "Subnet public-a"  "subnet-053b339f6291b582d"  aws ec2 describe-subnets        --subnet-ids           subnet-053b339f6291b582d  --region "$AWS_REGION" --query "Subnets[0].SubnetId"          --output text
          check "Subnet private-1" "subnet-084580d7cb9b7a892"  aws ec2 describe-subnets        --subnet-ids           subnet-084580d7cb9b7a892  --region "$AWS_REGION" --query "Subnets[0].SubnetId"          --output text
          check "Subnet private-2" "subnet-04cd77afc1a7a0561"  aws ec2 describe-subnets        --subnet-ids           subnet-04cd77afc1a7a0561  --region "$AWS_REGION" --query "Subnets[0].SubnetId"          --output text
          check "Route table"      "rtb-00be7f6ed797b47c8"     aws ec2 describe-route-tables   --route-table-ids      rtb-00be7f6ed797b47c8     --region "$AWS_REGION" --query "RouteTables[0].RouteTableId"  --output text
          check "SG RDS"           "sg-009778749a1df93c6"      aws ec2 describe-security-groups --group-ids           sg-009778749a1df93c6      --region "$AWS_REGION" --query "SecurityGroups[0].GroupId"    --output text
          check "SG Redis"         "sg-073285e2466a649d6"      aws ec2 describe-security-groups --group-ids           sg-073285e2466a649d6      --region "$AWS_REGION" --query "SecurityGroups[0].GroupId"    --output text
          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "One or more AWS resources referenced in infrastructure/master-backend-stack.yml do not exist."
            echo "Update the missing IDs in the template parameter defaults and push again."
            exit 1
          fi

      - name: Deploy / update infrastructure stack
        run: |
          set -euo pipefail
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack is in ROLLBACK_COMPLETE — deleting before recreate..."
            aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "$AWS_REGION"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "$AWS_REGION"
            echo "Stack deleted"
          fi
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file "infrastructure/master-backend-stack.yml" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "$AWS_REGION" \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              AppName=karaadi \
              DatabaseUrl="${{ secrets.DATABASE_URL }}" \
              RedisUrl="${{ secrets.REDIS_URL }}" \
              JWTSecret="${{ secrets.JWT_SECRET }}" \
              SessionSecret="${{ secrets.SESSION_SECRET }}" \
              EncryptionKey="${{ secrets.ENCRYPTION_KEY }}" \
              WaafiPayApiKey="${{ secrets.WAAFI_PAY_API_KEY }}" \
              TikTokClientSecret="${{ secrets.TIKTOK_CLIENT_SECRET }}"

      - name: Resolve CloudFormation outputs
        id: cfn
        run: |
          set -euo pipefail
          query_output() {
            val=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region     "$AWS_REGION" \
              --query      "Stacks[0].Outputs[?OutputKey=='${1}'].OutputValue" \
              --output     text 2>/dev/null || echo "")
            [ "$val" = "None" ] && echo "" || echo "$val"
          }
          APP_NAME="karaadi"
          EB_APP=$(query_output "EBApplicationName")
          EB_ENV=$(query_output "EBEnvironmentName")
          S3_BUCKET=$(query_output "ArtifactsBucketName")
          [ -n "$EB_APP" ] || EB_APP="${APP_NAME}-app"
          [ -n "$EB_ENV" ] || EB_ENV="${APP_NAME}-env"
          if [ -z "$S3_BUCKET" ]; then
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            S3_BUCKET="${APP_NAME}-eb-artifacts-${ACCOUNT_ID}"
          fi
          echo "eb_app=${EB_APP}"       >> "$GITHUB_OUTPUT"
          echo "eb_env=${EB_ENV}"       >> "$GITHUB_OUTPUT"
          echo "s3_bucket=${S3_BUCKET}" >> "$GITHUB_OUTPUT"
          echo "EB Application : $EB_APP"
          echo "EB Environment : $EB_ENV"
          echo "Artifacts bucket: $S3_BUCKET"

      - name: Ensure artifacts S3 bucket exists
        run: |
          BUCKET="${{ steps.cfn.outputs.s3_bucket }}"
          if aws s3api head-bucket --bucket "$BUCKET" --region "$AWS_REGION" 2>/dev/null; then
            echo "Bucket ${BUCKET} exists"
          else
            echo "Creating bucket ${BUCKET}..."
            aws s3 mb "s3://${BUCKET}" --region "$AWS_REGION"
            echo "Bucket ${BUCKET} created"
          fi

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-deploy-zip

      - name: Upload ZIP to S3
        run: |
          ARTIFACT_KEY="${{ needs.build.outputs.artifact_key }}"
          aws s3 cp backend-deploy.zip \
            "s3://${{ steps.cfn.outputs.s3_bucket }}/${ARTIFACT_KEY}" \
            --region "$AWS_REGION"
          echo "Uploaded to s3://${{ steps.cfn.outputs.s3_bucket }}/${ARTIFACT_KEY}"

      - name: Create EB application version
        run: |
          VERSION="${{ needs.build.outputs.version_label }}"
          ARTIFACT_KEY="${{ needs.build.outputs.artifact_key }}"
          aws elasticbeanstalk create-application-version \
            --application-name "${{ steps.cfn.outputs.eb_app }}" \
            --version-label    "${VERSION}" \
            --description      "Commit ${GITHUB_SHA:0:8} — ${{ github.actor }}" \
            --source-bundle    "S3Bucket=${{ steps.cfn.outputs.s3_bucket }},S3Key=${ARTIFACT_KEY}" \
            --region           "$AWS_REGION"
          echo "Created EB version: ${VERSION}"

      - name: Deploy to Elastic Beanstalk
        run: |
          VERSION="${{ needs.build.outputs.version_label }}"
          aws elasticbeanstalk update-environment \
            --application-name  "${{ steps.cfn.outputs.eb_app }}" \
            --environment-name  "${{ steps.cfn.outputs.eb_env }}" \
            --version-label     "${VERSION}" \
            --region            "$AWS_REGION"
          echo "Deployment triggered for version: ${VERSION}"

      - name: Wait for environment to become Ready
        timeout-minutes: 20
        run: |
          set -euo pipefail
          EB_ENV="${{ steps.cfn.outputs.eb_env }}"
          MAX=60
          for i in $(seq 1 $MAX); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --environment-names "$EB_ENV" --region "$AWS_REGION" \
              --query "Environments[0].Status" --output text)
            HEALTH=$(aws elasticbeanstalk describe-environments \
              --environment-names "$EB_ENV" --region "$AWS_REGION" \
              --query "Environments[0].Health" --output text)
            echo "[$i/$MAX] Status=${STATUS}  Health=${HEALTH}"
            case "$STATUS" in
              Ready)
                echo "✅ Deployment complete! Status=$STATUS Health=$HEALTH"
                [ "$HEALTH" != "Red" ] || { echo "⚠️  Health is Red — check EB logs."; exit 1; }
                exit 0 ;;
              Terminated|Terminating)
                echo "ERROR: Environment entered $STATUS during deployment."
                exit 1 ;;
            esac
            sleep 20
          done
          echo "ERROR: Timed out waiting for EB environment to become Ready."
          exit 1

      - name: Print live endpoint
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='EBEnvironmentURL'].OutputValue" \
            --output text)
          echo "🚀  Backend live at: ${URL}"

  seed-fix:
    name: "Seed-Fix (migrate deploy + npm run import)"
    if: github.event.inputs.action == 'Seed-Fix'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve EB instance IDs
        id: instances
        run: |
          set -euo pipefail
          EB_ENV=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='EBEnvironmentName'].OutputValue" \
            --output text)
          echo "EB environment: $EB_ENV"
          INSTANCES=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:elasticbeanstalk:environment-name,Values=${EB_ENV}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --region "$AWS_REGION" --output text)
          [ -n "$INSTANCES" ] || { echo "ERROR: No running instances for $EB_ENV"; exit 1; }
          echo "instances=${INSTANCES}" >> "$GITHUB_OUTPUT"
          echo "Instances: $INSTANCES"

      - name: Run migrate + seed via SSM
        env:
          INSTANCES: ${{ steps.instances.outputs.instances }}
        run: |
          set -euo pipefail
          COMMANDS=$(jq -nc '[
            "set -euo pipefail",
            "cd /var/app/current",
            "echo \"[seed-fix] prisma migrate deploy...\"",
            "npx prisma migrate deploy --schema=./src/prisma/schema.prisma",
            "echo \"[seed-fix] npm run import...\"",
            "npm run import",
            "echo \"[seed-fix] DONE\""
          ]')
          run_ssm() {
            local INST=$1
            CMD_ID=$(aws ssm send-command \
              --instance-ids  "$INST" --document-name "AWS-RunShellScript" \
              --comment       "seed-fix-${GITHUB_SHA:0:8}" \
              --parameters    "{\"commands\":${COMMANDS},\"executionTimeout\":[\"300\"]}" \
              --region        "$AWS_REGION" --output json | jq -r '.Command.CommandId')
            echo "  SSM command: $CMD_ID (instance: $INST)"
            for i in $(seq 1 60); do
              INV=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INST" \
                --region "$AWS_REGION" --output json 2>/dev/null \
                || echo '{"Status":"InProgress"}')
              STATUS=$(echo "$INV" | jq -r '.Status')
              echo "  [$i/60] $STATUS"
              case "$STATUS" in
                Success)
                  echo "$INV" | jq -r '.StandardOutputContent'; return 0 ;;
                Failed|Cancelled|TimedOut|Terminated)
                  echo "--- stdout ---"; echo "$INV" | jq -r '.StandardOutputContent'
                  echo "--- stderr ---"; echo "$INV" | jq -r '.StandardErrorContent'
                  return 1 ;;
              esac
              sleep 5
            done
            echo "ERROR: SSM timed out on $INST"; return 1
          }
          for INST in $INSTANCES; do
            echo "::group::Seed-Fix → $INST"
            run_ssm "$INST" || { echo "::endgroup::"; exit 1; }
            echo "::endgroup::"
          done
          echo "✅  Seed-Fix completed on all instances."
