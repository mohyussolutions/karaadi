name: Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  AWS_REGION: eu-west-1

jobs:
  test:
    name: Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:9000
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: eu-west-1_TESTPOOL
          NEXT_PUBLIC_COGNITO_CLIENT_ID: testclientid
        run: npm run build

  deploy:
    name: Deploy → Amplify
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger Amplify deployment and wait
        run: |
          set -euo pipefail
          APP_ID="${{ secrets.AMPLIFY_APP_ID }}"
          JOB_ID=$(aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name main \
            --job-type RELEASE \
            --region "$AWS_REGION" \
            --query "jobSummary.jobId" \
            --output text)
          echo "Amplify job started: $JOB_ID"
          for i in $(seq 1 90); do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name main \
              --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query "job.summary.status" \
              --output text)
            echo "[$i/90] $STATUS"
            case "$STATUS" in
              SUCCEED)
                echo "Deployment succeeded — https://main.${APP_ID}.amplifyapp.com"
                exit 0 ;;
              FAILED|CANCELLED)
                echo "Deployment $STATUS"
                exit 1 ;;
            esac
            sleep 20
          done
          echo "Timed out after 30 minutes"
          exit 1
