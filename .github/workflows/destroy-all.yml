name: Destroy All Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DESTROY to confirm — this deletes everything permanently"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  STACK_NAME: karaadi-production
  INFRA_ROLE: arn:aws:iam::108782100045:role/karaadi-infra-deploy

jobs:
  destroy:
    name: Delete CloudFormation Stack
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'DESTROY' }}
    steps:
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.INFRA_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Scale ASG to zero (drain EC2 before stack delete)
        run: |
          set -euo pipefail
          ASG=$(aws cloudformation describe-stack-resources \
            --stack-name "$STACK_NAME" \
            --logical-resource-id BackendAutoScalingGroup \
            --region "$AWS_REGION" \
            --query "StackResources[0].PhysicalResourceId" \
            --output text 2>/dev/null || echo "")
          if [ -n "$ASG" ] && [ "$ASG" != "None" ]; then
            echo "Scaling ASG $ASG to 0..."
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name "$ASG" \
              --min-size 0 --max-size 0 --desired-capacity 0 \
              --region "$AWS_REGION"
            echo "Waiting 60s for instances to terminate..."
            sleep 60
          fi

      - name: Delete RDS final snapshot (unblock stack deletion)
        run: |
          set -euo pipefail
          RDS_ID=$(aws cloudformation describe-stack-resources \
            --stack-name "$STACK_NAME" \
            --logical-resource-id RDSInstance \
            --region "$AWS_REGION" \
            --query "StackResources[0].PhysicalResourceId" \
            --output text 2>/dev/null || echo "")
          if [ -n "$RDS_ID" ] && [ "$RDS_ID" != "None" ]; then
            echo "Deleting RDS instance $RDS_ID (skip-final-snapshot)..."
            aws rds delete-db-instance \
              --db-instance-identifier "$RDS_ID" \
              --skip-final-snapshot \
              --region "$AWS_REGION" 2>/dev/null || true
            echo "Waiting for RDS to finish deleting (up to 10 min)..."
            aws rds wait db-instance-deleted \
              --db-instance-identifier "$RDS_ID" \
              --region "$AWS_REGION" || true
          fi

      - name: Delete CloudFormation stack
        run: |
          set -euo pipefail
          echo "Deleting stack $STACK_NAME..."
          aws cloudformation delete-stack \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION"
          echo "Waiting for stack deletion to complete (up to 30 min)..."
          aws cloudformation wait stack-delete-complete \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION"
          echo "Stack deleted."

      - name: Verify deletion
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DELETED")
          echo "Final status: $STATUS"
          if [ "$STATUS" = "DELETED" ] || [ "$STATUS" = "DELETE_COMPLETE" ]; then
            echo "All infrastructure destroyed successfully."
          else
            echo "WARNING: Stack status is $STATUS — manual cleanup may be required."
            exit 1
          fi
