name: Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"
  AWS_REGION: eu-west-1
  STACK_NAME: karaadi-production
  INFRA_ROLE: arn:aws:iam::108782100045:role/karaadi-infra-deploy
  BACKEND_ROLE: arn:aws:iam::108782100045:role/karaadi-backend-deploy
  FRONTEND_ROLE: arn:aws:iam::108782100045:role/karaadi-frontend-deploy

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. TEST BACKEND
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Test / Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: npx prisma generate

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          AWS_REGION: eu-west-1
          JWT_SECRET: test-jwt-secret-32-characters-long
          NODE_ENV: test
          AWS_SDK_JS_SUPPRESS_MAINTENANCE_MODE_MESSAGE: 1
        run: npm test --if-present

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. TEST FRONTEND
  # ─────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Test / Frontend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        timeout-minutes: 5
        run: ./node_modules/.bin/tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. INFRA / CLOUDFORMATION
  # ─────────────────────────────────────────────────────────────────────────────
  infra:
    name: Infra / CloudFormation
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install cfn-lint
        run: pip install cfn-lint --quiet

      - name: Lint template
        run: cfn-lint infrastructure/production.yaml --format json --ignore-checks W1011 || [ $? -eq 4 ]

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.INFRA_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy stack
        env:
          GITHUB_ORG: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query "Stacks[0].Parameters[*].ParameterKey" \
            --output json > /tmp/param_keys.json
          python3 infrastructure/scripts/build_cfn_params.py
          if aws cloudformation update-stack \
              --template-body file://infrastructure/production.yaml \
              --stack-name "$STACK_NAME" \
              --capabilities CAPABILITY_NAMED_IAM \
              --parameters file:///tmp/params.json \
              --region "$AWS_REGION" 2>/tmp/cfn_err.txt; then
            if ! aws cloudformation wait stack-update-complete \
                --stack-name "$STACK_NAME" --region "$AWS_REGION"; then
              echo "--- CloudFormation failure events ---"
              aws cloudformation describe-stack-events \
                --stack-name "$STACK_NAME" --region "$AWS_REGION" \
                --query "StackEvents[?contains('UPDATE_FAILED CREATE_FAILED', ResourceStatus)].{Resource:LogicalResourceId,Status:ResourceStatus,Reason:ResourceStatusReason}" \
                --output table
              exit 1
            fi
          elif grep -q "No updates are to be performed" /tmp/cfn_err.txt; then
            echo "No infrastructure changes to apply."
          else
            cat /tmp/cfn_err.txt >&2; exit 1
          fi

      - name: Stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs" \
            --output table

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. BACKEND DEPLOY
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend / Deploy
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BACKEND_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fix DATABASE_URL in SSM
        run: |
          set -euo pipefail
          DB_USER="karaadi_database_2025_for_prod"
          DB_PASS="karaadi_password_2025_for_prod"
          RDS_HOST=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='RDSEndpoint'].OutputValue" \
            --output text 2>/dev/null || echo "")
          if [ -z "$RDS_HOST" ] || [ "$RDS_HOST" = "None" ]; then
            echo "WARNING: no RDS endpoint found — SSM not updated"
            exit 0
          fi
          echo "RDS: $RDS_HOST"
          CURRENT=$(aws ssm get-parameter --name /karaadi/backend/env --with-decryption --query Parameter.Value --output text --region "$AWS_REGION")
          patch_env() { local key=$1 val=$2 content=$3; if echo "$content" | grep -q "^${key}="; then echo "$content" | sed "s|^${key}=.*|${key}=${val}|"; else printf '%s\n%s=%s' "$content" "$key" "$val"; fi; }
          UPDATED="$CURRENT"
          UPDATED=$(patch_env "DATABASE_URL"                    "postgresql://${DB_USER}:${DB_PASS}@${RDS_HOST}:5432/karaadi" "$UPDATED")
          UPDATED=$(patch_env "ALLOWED_ORIGINS"                 "https://karaadi.com,https://www.karaadi.com" "$UPDATED")
          UPDATED=$(patch_env "KARAADI_AWS_COGNITO_USER_POOL_ID" "eu-west-1_mmyv1vz45" "$UPDATED")
          UPDATED=$(patch_env "KARAADI_AWS_COGNITO_CLIENT_ID"    "29lcmo54mlc692mbsf26j07g7p" "$UPDATED")
          UPDATED=$(patch_env "COGNITO_JWKS_URL"                 "https://cognito-idp.eu-west-1.amazonaws.com/eu-west-1_mmyv1vz45/.well-known/jwks.json" "$UPDATED")
          UPDATED=$(patch_env "NODE_ENV"                         "production" "$UPDATED")
          UPDATED=$(patch_env "PORT"                             "8080" "$UPDATED")
          UPDATED=$(patch_env "BACKEND_URL"                      "https://api.karaadi.com" "$UPDATED")
          UPDATED=$(patch_env "NEXT_PUBLIC_FRONTEND_URL"         "https://karaadi.com" "$UPDATED")
          UPDATED=$(patch_env "COOKIE_DOMAIN"                    "karaadi.com" "$UPDATED")
          UPDATED=$(patch_env "USE_WAAFIPAY_PROD"                "true" "$UPDATED")
          UPDATED=$(patch_env "AWS_REGION"                       "eu-west-1" "$UPDATED")
          aws ssm put-parameter --name /karaadi/backend/env --value "$UPDATED" --type SecureString --tier Advanced --overwrite --region "$AWS_REGION"
          echo "SSM env patched"

      - name: Get ASG name
        id: cfn
        run: |
          ASG=$(aws cloudformation describe-stack-resources \
            --stack-name "$STACK_NAME" \
            --logical-resource-id BackendAutoScalingGroup \
            --region "$AWS_REGION" \
            --query "StackResources[0].PhysicalResourceId" \
            --output text)
          echo "asg=$ASG" >> "$GITHUB_OUTPUT"
          echo "ASG: $ASG"

      - name: Rolling deploy via SSM
        env:
          ASG: ${{ steps.cfn.outputs.asg }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG" \
            --region "$AWS_REGION" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          TOTAL=$(echo "$INSTANCES" | wc -w | tr -d ' ')
          echo "Deploying ${SHA:0:8} to $TOTAL instance(s)"

          COMMANDS=$(jq -nc --arg region "$AWS_REGION" '[
            "set -euo pipefail",
            ("aws ssm get-parameter --name /karaadi/backend/env --with-decryption --query Parameter.Value --output text --region " + $region + " > /home/ec2-user/karaadi/backend/.env || exit 1"),
            "[ -s /home/ec2-user/karaadi/backend/.env ] || exit 1",
            "cp /home/ec2-user/karaadi/backend/.env /home/ec2-user/karaadi/backend/.env.production",
            "cd /home/ec2-user/karaadi && git fetch origin main && git reset --hard origin/main",
            "cd /home/ec2-user/karaadi/backend && npm ci",
            "cd /home/ec2-user/karaadi/backend && npx prisma generate",
            "dnf install -y postgresql15 2>/dev/null || yum install -y postgresql15 2>/dev/null || true",
            "python3 -c \"import subprocess,re,os; env=open('/home/ec2-user/karaadi/backend/.env').read(); m=re.search(r'DATABASE_URL=postgresql://([^:]+):([^@]+)@([^:/]+)(?::([0-9]+))?/([^?\\\\s]+)', env); u,p,h,port,db=m.group(1),m.group(2),m.group(3),(m.group(4) or '5432'),m.group(5); e={**os.environ,'PGPASSWORD':p}; subprocess.run(['psql','-h',h,'-p',port,'-U',u,'-d','postgres','-c',f'DROP DATABASE IF EXISTS {db} WITH (FORCE);'],env=e); subprocess.run(['psql','-h',h,'-p',port,'-U',u,'-d','postgres','-c',f'CREATE DATABASE {db} OWNER {u};'],env=e); print('DB_RECREATED')\"",
            "cd /home/ec2-user/karaadi/backend && npx prisma migrate deploy",
            "echo --- importing seed data ---",
            "cd /home/ec2-user/karaadi/backend && npm run import && echo IMPORT_OK || echo IMPORT_FAILED",
            "pm2 delete karaadi-backend 2>/dev/null || true",
            "pm2 start npm --name karaadi-backend --cwd /home/ec2-user/karaadi/backend -- run start",
            "pm2 save",
            "env PATH=$PATH:/usr/bin pm2 startup systemd -u ec2-user --hp /home/ec2-user 2>/dev/null || true",
            "sleep 10 && curl -s http://localhost:8080/health && echo HEALTH_OK && pm2 list"
          ]')

          COUNT=0
          for INSTANCE in $INSTANCES; do
            COUNT=$((COUNT + 1))
            echo "=== [$COUNT/$TOTAL] $INSTANCE ==="

            CMD_ID=""
            for attempt in $(seq 1 10); do
              CMD_ID=$(aws ssm send-command \
                --instance-ids "$INSTANCE" \
                --document-name "AWS-RunShellScript" \
                --comment "deploy-${SHA:0:8}" \
                --parameters "{\"commands\":$COMMANDS,\"executionTimeout\":[\"300\"]}" \
                --region "$AWS_REGION" \
                --output json 2>/dev/null | jq -r '.Command.CommandId // empty')
              [ -n "$CMD_ID" ] && echo "SSM command: $CMD_ID" && break
              echo "[$attempt/10] SSM not ready, retrying in 15s..."
              sleep 15
            done
            [ -n "$CMD_ID" ] || { echo "WARNING: could not reach $INSTANCE via SSM — skipping"; continue; }

            for i in $(seq 1 60); do
              INV=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE" \
                --region "$AWS_REGION" --output json 2>/dev/null \
                || echo '{"Status":"InProgress"}')
              STATUS=$(echo "$INV" | jq -r '.Status')
              echo "[$i/60] $STATUS"
              case "$STATUS" in
                Success)
                  echo "--- OUTPUT ---"
                  echo "$INV" | jq -r '.StandardOutputContent'
                  break ;;
                Failed|Cancelled|TimedOut)
                  echo "--- STDOUT ---"
                  echo "$INV" | jq -r '.StandardOutputContent'
                  echo "--- STDERR ---"
                  echo "$INV" | jq -r '.StandardErrorContent'
                  exit 1 ;;
                *) sleep 10 ;;
              esac
            done

            [ "$COUNT" -lt "$TOTAL" ] && sleep 30
          done
          echo "All $TOTAL instance(s) deployed."

      - name: Ensure backend is running on all instances
        if: always()
        env:
          ASG: ${{ steps.cfn.outputs.asg }}
        run: |
          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG" --region "$AWS_REGION" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text 2>/dev/null || echo "")
          [ -z "$INSTANCES" ] && echo "No instances found" && exit 0

          COMMANDS=$(jq -nc '[
            "pm2 describe karaadi-backend > /dev/null 2>&1 && pm2 restart karaadi-backend --update-env || pm2 start npm --name karaadi-backend --cwd /home/ec2-user/karaadi/backend -- run start",
            "pm2 save",
            "sleep 10 && curl -sf http://localhost:8080/health && echo SERVER_RUNNING && pm2 list"
          ]')

          for INSTANCE in $INSTANCES; do
            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --comment "ensure-running" \
              --parameters "{\"commands\":$COMMANDS,\"executionTimeout\":[\"60\"]}" \
              --region "$AWS_REGION" --output json 2>/dev/null | jq -r '.Command.CommandId // empty')
            [ -z "$CMD_ID" ] && echo "Could not reach $INSTANCE" && continue
            echo "Ensuring $INSTANCE is running (SSM: $CMD_ID)"
            for i in $(seq 1 18); do
              INV=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE" \
                --region "$AWS_REGION" --output json 2>/dev/null \
                || echo '{"Status":"InProgress"}')
              STATUS=$(echo "$INV" | jq -r '.Status')
              case "$STATUS" in
                Success) echo "$INV" | jq -r '.StandardOutputContent'; break ;;
                Failed|Cancelled|TimedOut) echo "$INV" | jq -r '.StandardOutputContent'; break ;;
                *) sleep 5 ;;
              esac
            done
          done

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. FRONTEND DEPLOY
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend / Deploy
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.FRONTEND_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Amplify App ID
        id: cfn
        run: |
          APP_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='AmplifyAppId'].OutputValue" \
            --output text)
          if [ -z "$APP_ID" ] || [ "$APP_ID" = "None" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix NEXT_PUBLIC_API_URL (remove :8080 if present)
        if: steps.cfn.outputs.skip != 'true'
        env:
          APP_ID: ${{ steps.cfn.outputs.app_id }}
        run: |
          VARS=$(aws amplify get-app --app-id "$APP_ID" --region "$AWS_REGION" \
            --query "app.environmentVariables" --output json)
          CURRENT=$(echo "$VARS" | jq -r '.NEXT_PUBLIC_API_URL // ""')
          FIXED=$(echo "$CURRENT" | sed 's/:8080//')
          if [ "$CURRENT" != "$FIXED" ] && [ -n "$FIXED" ]; then
            UPDATED=$(echo "$VARS" | jq -c --arg url "$FIXED" '.NEXT_PUBLIC_API_URL = $url')
            aws amplify update-app --app-id "$APP_ID" \
              --environment-variables "$UPDATED" --region "$AWS_REGION"
            echo "Fixed: $CURRENT -> $FIXED"
          else
            echo "NEXT_PUBLIC_API_URL is correct: $CURRENT"
          fi

      - name: Trigger Amplify build
        if: steps.cfn.outputs.skip != 'true'
        id: start
        env:
          APP_ID: ${{ steps.cfn.outputs.app_id }}
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name main \
            --job-type RELEASE \
            --commit-id "${{ github.sha }}" \
            --region "$AWS_REGION" \
            --query "jobSummary.jobId" \
            --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Amplify job: $JOB_ID"

      - name: Wait for build
        if: steps.cfn.outputs.skip != 'true'
        env:
          APP_ID: ${{ steps.cfn.outputs.app_id }}
          JOB_ID: ${{ steps.start.outputs.job_id }}
        run: |
          for i in $(seq 1 180); do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" --branch-name main --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query "job.summary.status" --output text)
            echo "[$i/180] $STATUS"
            case "$STATUS" in
              SUCCEED) echo "Build succeeded."; break ;;
              FAILED|CANCELLED) echo "Build $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done

      - name: No Amplify app yet
        if: steps.cfn.outputs.skip == 'true'
        run: echo "Amplify app not configured yet."
