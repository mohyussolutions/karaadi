name: Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"
  AWS_REGION: eu-west-1
  STACK_NAME: karaadi-production
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  INFRA_ROLE: arn:aws:iam::108782100045:role/karaadi-infra-deploy
  BACKEND_ROLE: arn:aws:iam::108782100045:role/karaadi-backend-deploy
  FRONTEND_ROLE: arn:aws:iam::108782100045:role/karaadi-frontend-deploy

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. TEST  (backend + frontend in parallel, both must pass)
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Test / Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: npx prisma generate

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          AWS_REGION: eu-west-1
          JWT_SECRET: test-jwt-secret-32-characters-long
          NODE_ENV: test
          AWS_SDK_JS_SUPPRESS_MAINTENANCE_MODE_MESSAGE: 1
        run: npm test --if-present

  test-frontend:
    name: Test / Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. INFRA  (CloudFormation — only after both tests pass)
  # ─────────────────────────────────────────────────────────────────────────────
  infra:
    name: Infra / CloudFormation
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Install cfn-lint
        run: pip install cfn-lint --quiet

      - name: Lint template
        run: cfn-lint infrastructure/production.yaml --format json --ignore-checks W1011 || [ $? -eq 4 ]

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.INFRA_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy stack
        env:
          GITHUB_ORG: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" --region "$AWS_REGION" \
            --query "Stacks[0].Parameters[*].ParameterKey" \
            --output json > /tmp/param_keys.json
          python3 infrastructure/scripts/build_cfn_params.py
          if aws cloudformation update-stack \
              --template-body file://infrastructure/production.yaml \
              --stack-name "$STACK_NAME" \
              --capabilities CAPABILITY_NAMED_IAM \
              --parameters file:///tmp/params.json \
              --region "$AWS_REGION" 2>/tmp/cfn_err.txt; then
            if ! aws cloudformation wait stack-update-complete \
                --stack-name "$STACK_NAME" --region "$AWS_REGION"; then
              echo "--- CloudFormation failure events ---"
              aws cloudformation describe-stack-events \
                --stack-name "$STACK_NAME" --region "$AWS_REGION" \
                --query "StackEvents[?contains('UPDATE_FAILED CREATE_FAILED', ResourceStatus)].{Resource:LogicalResourceId,Status:ResourceStatus,Reason:ResourceStatusReason}" \
                --output table
              exit 1
            fi
          elif grep -q "No updates are to be performed" /tmp/cfn_err.txt; then
            echo "No infrastructure changes to apply."
          else
            cat /tmp/cfn_err.txt >&2; exit 1
          fi

      - name: Stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs" \
            --output table

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. BACKEND  (build → S3 → SSM deploy to EC2)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend / Deploy
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.BACKEND_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build backend bundle
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: |
          cd backend
          npm ci --omit=dev
          npx prisma generate
          npx esbuild src/server.ts --bundle --platform=node --target=node24 --format=esm --packages=external --outfile=dist/index.js
          npx esbuild src/prisma/seed.ts --bundle --platform=node --target=node24 --format=esm --packages=external --outfile=dist/seed.js

      - name: Upload bundle to S3
        run: |
          cd backend
          tar --exclude="._*" --exclude=".DS_Store" -czf /tmp/backend-${{ github.sha }}.tar.gz dist/ src/prisma/ prisma.config.ts package.json package-lock.json
          aws s3 cp /tmp/backend-${{ github.sha }}.tar.gz \
            s3://karaadi-images-108782100045/deployments/backend-${{ github.sha }}.tar.gz

      - name: Fix DATABASE_URL in SSM
        env:
          DB_MASTER_PASSWORD: ${{ secrets.DB_MASTER_PASSWORD }}
        run: |
          [ -z "$DB_MASTER_PASSWORD" ] && echo "DB_MASTER_PASSWORD secret not set — skipping" && exit 0
          RDS_HOST=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='RDSEndpoint'].OutputValue" \
            --output text)
          [ -z "$RDS_HOST" ] || [ "$RDS_HOST" = "None" ] && echo "No RDS endpoint found" && exit 0
          CURRENT=$(aws ssm get-parameter --name /karaadi/backend/env \
            --with-decryption --query Parameter.Value --output text --region "$AWS_REGION")
          export NEW_DB_LINE="DATABASE_URL=postgresql://karaadi_admin:${DB_MASTER_PASSWORD}@${RDS_HOST}:5432/karaadi_production?connection_limit=20&pool_timeout=20"
          UPDATED=$(printf '%s' "$CURRENT" | python3 -c \
            'import sys,os,re;c=sys.stdin.read();l=os.environ["NEW_DB_LINE"];p=re.compile(r"^DATABASE_URL=.*",re.MULTILINE);print(p.sub(l,c) if p.search(c) else c.rstrip()+"\n"+l,end="")')
          aws ssm put-parameter --name /karaadi/backend/env --value "$UPDATED" \
            --type SecureString --overwrite --region "$AWS_REGION"
          echo "DATABASE_URL patched in SSM → karaadi_admin@${RDS_HOST}/karaadi_production"

      - name: Get ASG name
        id: cfn
        run: |
          ASG=$(aws cloudformation describe-stack-resources \
            --stack-name "$STACK_NAME" \
            --logical-resource-id BackendAutoScalingGroup \
            --region "$AWS_REGION" \
            --query "StackResources[0].PhysicalResourceId" \
            --output text)
          echo "asg=$ASG" >> "$GITHUB_OUTPUT"
          echo "ASG: $ASG"

      - name: Rolling deploy via SSM
        env:
          ASG: ${{ steps.cfn.outputs.asg }}
          SHA: ${{ github.sha }}
          S3_BUCKET: karaadi-images-108782100045
        run: |
          set -euo pipefail

          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG" \
            --region "$AWS_REGION" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          TOTAL=$(echo "$INSTANCES" | wc -w | tr -d ' ')
          echo "Deploying ${SHA:0:8} to $TOTAL instance(s)"

          COMMANDS=$(jq -nc --arg sha "$SHA" --arg bucket "$S3_BUCKET" --arg region "$AWS_REGION" '[
            "set -euo pipefail",
            "mkdir -p /home/ec2-user/karaadi/backend",
            "echo STEP: fetch env",
            ("aws ssm get-parameter --name /karaadi/backend/env --with-decryption --query Parameter.Value --output text --region " + $region + " > /home/ec2-user/karaadi/backend/.env || { echo ERROR: SSM param /karaadi/backend/env not found or no permission; exit 1; }"),
            "[ -s /home/ec2-user/karaadi/backend/.env ] || { echo ERROR: env file is empty; exit 1; }",
            "echo STEP: download bundle",
            ("aws s3 cp s3://" + $bucket + "/deployments/backend-" + $sha + ".tar.gz /tmp/backend.tar.gz --region " + $region),
            "echo STEP: extract bundle",
            "rm -rf /home/ec2-user/karaadi/backend/src/prisma",
            "tar -xzf /tmp/backend.tar.gz -C /home/ec2-user/karaadi/backend",
            "echo STEP: npm install",
            "cd /home/ec2-user/karaadi/backend && npm ci --omit=dev",
            "echo STEP: prisma generate",
            "cd /home/ec2-user/karaadi/backend && npx prisma generate",
            "echo STEP: seed data (npm run import equivalent)",
            "cd /home/ec2-user/karaadi/backend && NODE_ENV=production node --env-file=.env dist/seed.js && echo SEED_OK || { echo SEED_FAILED — check DATABASE_URL in SSM; }",
            "echo STEP: restart app",
            "pm2 delete karaadi-backend 2>/dev/null || true",
            "pm2 start /home/ec2-user/karaadi/backend/dist/index.js --name karaadi-backend --node-args \"--env-file=/home/ec2-user/karaadi/backend/.env\"",
            "echo STEP: health check",
            "sleep 20 && curl -sf http://localhost:8080/health && echo HEALTH_OK"
          ]')

          COUNT=0
          for INSTANCE in $INSTANCES; do
            COUNT=$((COUNT + 1))
            echo "=== [$COUNT/$TOTAL] $INSTANCE ==="

            CMD_ID=""
            for attempt in $(seq 1 10); do
              CMD_ID=$(aws ssm send-command \
                --instance-ids "$INSTANCE" \
                --document-name "AWS-RunShellScript" \
                --comment "deploy-${SHA:0:8}" \
                --parameters "{\"commands\":$COMMANDS,\"executionTimeout\":[\"300\"]}" \
                --region "$AWS_REGION" \
                --output json 2>/dev/null | jq -r '.Command.CommandId // empty')
              [ -n "$CMD_ID" ] && echo "SSM command: $CMD_ID" && break
              echo "[$attempt/10] SSM not ready, retrying in 15s..."
              sleep 15
            done
            [ -n "$CMD_ID" ] || { echo "ERROR: could not send SSM command to $INSTANCE"; exit 1; }

            for i in $(seq 1 60); do
              INV=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE" \
                --region "$AWS_REGION" --output json 2>/dev/null \
                || echo '{"Status":"InProgress"}')
              STATUS=$(echo "$INV" | jq -r '.Status')
              echo "[$i/60] $STATUS"
              case "$STATUS" in
                Success)
                  echo "--- OUTPUT ---"
                  echo "$INV" | jq -r '.StandardOutputContent'
                  break ;;
                Failed|Cancelled|TimedOut)
                  echo "--- STDOUT ---"
                  echo "$INV" | jq -r '.StandardOutputContent'
                  echo "--- STDERR ---"
                  echo "$INV" | jq -r '.StandardErrorContent'
                  exit 1 ;;
                *) sleep 10 ;;
              esac
            done

            [ "$COUNT" -lt "$TOTAL" ] && sleep 30
          done
          echo "All $TOTAL instance(s) deployed."

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. FRONTEND  (Amplify build — only after backend)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend / Amplify
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.FRONTEND_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Amplify App ID
        id: cfn
        run: |
          APP_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='AmplifyAppId'].OutputValue" \
            --output text)
          if [ -z "$APP_ID" ] || [ "$APP_ID" = "None" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix NEXT_PUBLIC_API_URL (remove :8080 if present)
        if: steps.cfn.outputs.skip != 'true'
        env:
          APP_ID: ${{ steps.cfn.outputs.app_id }}
        run: |
          VARS=$(aws amplify get-app --app-id "$APP_ID" --region "$AWS_REGION" \
            --query "app.environmentVariables" --output json)
          CURRENT=$(echo "$VARS" | jq -r '.NEXT_PUBLIC_API_URL // ""')
          FIXED=$(echo "$CURRENT" | sed 's/:8080//')
          if [ "$CURRENT" != "$FIXED" ] && [ -n "$FIXED" ]; then
            UPDATED=$(echo "$VARS" | jq -c --arg url "$FIXED" '.NEXT_PUBLIC_API_URL = $url')
            aws amplify update-app --app-id "$APP_ID" \
              --environment-variables "$UPDATED" --region "$AWS_REGION"
            echo "Fixed: $CURRENT → $FIXED"
          else
            echo "NEXT_PUBLIC_API_URL is already correct: $CURRENT"
          fi

      - name: Trigger Amplify build
        if: steps.cfn.outputs.skip != 'true'
        id: start
        env:
          APP_ID: ${{ steps.cfn.outputs.app_id }}
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name main \
            --job-type RELEASE \
            --commit-id "${{ github.sha }}" \
            --region "$AWS_REGION" \
            --query "jobSummary.jobId" \
            --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Amplify job: $JOB_ID"

      - name: Wait for build
        if: steps.cfn.outputs.skip != 'true'
        env:
          APP_ID: ${{ steps.cfn.outputs.app_id }}
          JOB_ID: ${{ steps.start.outputs.job_id }}
        run: |
          for i in $(seq 1 180); do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" --branch-name main --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query "job.summary.status" --output text)
            echo "[$i/180] $STATUS"
            case "$STATUS" in
              SUCCEED) echo "Build succeeded. URL: https://main.${APP_ID}.amplifyapp.com"; break ;;
              FAILED|CANCELLED) echo "Build $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done

      - name: No Amplify app yet
        if: steps.cfn.outputs.skip == 'true'
        run: echo "Amplify app not created yet — set up Amplify in AWS Console first."
