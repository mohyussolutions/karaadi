name: Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  AWS_REGION: eu-west-1
  STACK_NAME: karaadi-production

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. TEST  (backend + frontend run in parallel, both must pass)
  # ─────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Test / Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
        run: npx prisma generate

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Tests
        working-directory: backend
        run: npm test --if-present

  test-frontend:
    name: Test / Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. INFRA  (CloudFormation — only after both tests pass)
  # ─────────────────────────────────────────────────────────────────────────────
  infra:
    name: Infra / CloudFormation
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Install cfn-lint
        run: pip install cfn-lint --quiet

      - name: Lint template
        run: cfn-lint infrastructure/production.yaml --format json --ignore-checks W1011 || [ $? -eq 4 ]

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/production.yaml \
            --stack-name "$STACK_NAME" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              GitHubOrg="${{ github.repository_owner }}" \
              GitHubRepo="${GITHUB_REPOSITORY#*/}" \
              DBUsername="karaadi_admin" \
              DBPassword="${{ secrets.DB_PASSWORD }}" \
              DomainName="karaadi.com" \
            --no-fail-on-empty-changeset \
            --region "$AWS_REGION"

      - name: Stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs" \
            --output table

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. BACKEND  (rolling SSM deploy to EC2 — only after infra)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend / Deploy
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ASG name
        id: cfn
        run: |
          ASG=$(aws cloudformation describe-stack-resources \
            --stack-name "$STACK_NAME" \
            --logical-resource-id BackendAutoScalingGroup \
            --region "$AWS_REGION" \
            --query "StackResources[0].PhysicalResourceId" \
            --output text)
          echo "asg=$ASG" >> "$GITHUB_OUTPUT"
          echo "ASG: $ASG"

      - name: Rolling deploy via SSM
        env:
          ASG: ${{ steps.cfn.outputs.asg }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG" \
            --region "$AWS_REGION" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          TOTAL=$(echo "$INSTANCES" | wc -w | tr -d ' ')
          echo "Deploying ${SHA:0:8} to $TOTAL instance(s)"

          COMMANDS=$(jq -nc '[
            "set -euo pipefail",
            "cd /home/ec2-user/karaadi",
            "git fetch origin main && git reset --hard origin/main",
            "cd backend && npm ci --omit=dev",
            "npx prisma migrate deploy",
            "npx esbuild src/server.ts --bundle --platform=node --target=node20 --packages=external --outfile=dist/index.js",
            "pm2 reload karaadi-backend --update-env || pm2 start dist/index.js --name karaadi-backend",
            "sleep 5 && curl -sf http://localhost:8080/health && echo HEALTH_OK"
          ]')

          COUNT=0
          for INSTANCE in $INSTANCES; do
            COUNT=$((COUNT + 1))
            echo "::group::[$COUNT/$TOTAL] $INSTANCE"

            CMD_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE" \
              --document-name "AWS-RunShellScript" \
              --comment "deploy-${SHA:0:8}" \
              --parameters "{\"commands\":$COMMANDS,\"executionTimeout\":[\"300\"]}" \
              --region "$AWS_REGION" \
              --output json | jq -r '.Command.CommandId')

            for i in $(seq 1 60); do
              INV=$(aws ssm get-command-invocation \
                --command-id "$CMD_ID" --instance-id "$INSTANCE" \
                --region "$AWS_REGION" --output json 2>/dev/null \
                || echo '{"Status":"InProgress"}')
              STATUS=$(echo "$INV" | jq -r '.Status')
              echo "  [$i/60] $STATUS"
              case "$STATUS" in
                Success) echo "$INV" | jq -r '.StandardOutputContent'; break ;;
                Failed|Cancelled|TimedOut)
                  echo "$INV" | jq -r '.StandardOutputContent,.StandardErrorContent'
                  echo "::endgroup::"; exit 1 ;;
                *) sleep 5 ;;
              esac
            done

            echo "::endgroup::"
            [ "$COUNT" -lt "$TOTAL" ] && sleep 30
          done
          echo "All $TOTAL instance(s) deployed."

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. FRONTEND  (Amplify build — only after backend)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend / Amplify
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Amplify App ID
        id: cfn
        run: |
          APP_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='AmplifyAppId'].OutputValue" \
            --output text)
          if [ -z "$APP_ID" ] || [ "$APP_ID" = "None" ]; then
            echo "AmplifyAppId not in stack — skipping Amplify deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Amplify build
        if: steps.cfn.outputs.skip != 'true'
        id: start
        env:
          APP_ID: ${{ steps.cfn.outputs.app_id }}
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$APP_ID" \
            --branch-name main \
            --job-type RELEASE \
            --commit-id "${{ github.sha }}" \
            --region "$AWS_REGION" \
            --query "jobSummary.jobId" \
            --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Amplify job: $JOB_ID"

      - name: Wait for build
        if: steps.cfn.outputs.skip != 'true'
        env:
          APP_ID: ${{ steps.cfn.outputs.app_id }}
          JOB_ID: ${{ steps.start.outputs.job_id }}
        run: |
          for i in $(seq 1 180); do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" --branch-name main --job-id "$JOB_ID" \
              --region "$AWS_REGION" \
              --query "job.summary.status" --output text)
            echo "[$i/180] $STATUS"
            case "$STATUS" in
              SUCCEED) echo "Build succeeded. URL: https://main.${APP_ID}.amplifyapp.com"; break ;;
              FAILED|CANCELLED) echo "Build $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done

      - name: No Amplify app yet
        if: steps.cfn.outputs.skip == 'true'
        run: echo "Amplify app not created yet — set up Amplify in AWS Console first (see karaadi_documentations/README.md)"
