name: PR Checks

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:

  backend:
    name: Backend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
        working-directory: backend

      - run: npx tsc --noEmit
        working-directory: backend

      - run: npm run build
        working-directory: backend

  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npx tsc --noEmit
        working-directory: frontend

      - name: Build (smoke test)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build

  infra:
    name: CloudFormation — lint template
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'production/')
    steps:
      - uses: actions/checkout@v4

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint CloudFormation template
        run: cfn-lint production/production.yaml
