AWSTemplateFormatVersion: "2010-09-09"
Description: Karaadi Full Production Stack - Managed API, Scaling, and DBs

Resources:
  # --- COGNITO ---
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: karaadi-users
      AutoVerifiedAttributes: [email]

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: karaadi-web-client

  # --- SECRETS MANAGER ---
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: karaadi/prod/db-pass
      GenerateSecretString: { PasswordLength: 16, ExcludePunctuation: true }

  # --- IAM ROLES ---
  EBInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          [
            {
              Effect: Allow,
              Principal: { Service: ec2.amazonaws.com },
              Action: "sts:AssumeRole",
            },
          ]
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWebTier
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite

  EBInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties: { Roles: [!Ref EBInstanceRole] }

  # --- BACKEND + LOAD BALANCER + AUTO SCALING ---
  EBApp:
    Type: AWS::ElasticBeanstalk::Application
    Properties: { ApplicationName: karaadi-backend }

  EBEnv:
    Type: AWS::ElasticBeanstalk::Environment
    Properties:
      ApplicationName: !Ref EBApp
      EnvironmentName: karaadi-prod
      SolutionStackName: "64bit Amazon Linux 2023 v6.1.2 running Node.js 20"
      OptionSettings:
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: IamInstanceProfile
          Value: !Ref EBInstanceProfile
        - Namespace: aws:elasticbeanstalk:environment
          OptionName: EnvironmentType
          Value: LoadBalanced
        - Namespace: aws:elasticbeanstalk:environment:process:default
          OptionName: HealthCheckPath
          Value: /api/health
        - Namespace: aws:autoscaling:asg
          OptionName: MinSize
          Value: "2"
        - Namespace: aws:autoscaling:asg
          OptionName: MaxSize
          Value: "6"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DATABASE_URL
          Value: !Sub "postgresql://postgres:{{resolve:secretsmanager:${DBSecret}:SecretString}}@${PostgresDB.Endpoint.Address}:${PostgresDB.Endpoint.Port}/postgres"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: REDIS_URL
          Value: !Sub "redis://${RedisCache.ConfigurationEndpoint.Address}:${RedisCache.ConfigurationEndpoint.Port}"

  # --- API GATEWAY (Proxy to Load Balancer) ---
  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties: { Name: KaraadiAPI }

  # --- DATABASES ---
  PostgresDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.t3.micro
      Engine: postgres
      AllocatedStorage: "20"
      MasterUsername: postgres
      MasterUserPassword:
        !Join [
          "",
          ["{{resolve:secretsmanager:", !Ref DBSecret, ":SecretString}}"],
        ]

  RedisCache:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      { CacheNodeType: cache.t3.micro, Engine: redis, NumCacheNodes: 1 }

  # --- FRONTEND ---
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: karaadi-frontend
      Repository: !Sub "https://github.com/${AWS::AccountId}/karaadi"
      Platform: WEB
