AWSTemplateFormatVersion: "2010-09-09"
Description: Infrastructure for Karaadi App - RDS, Redis, Cognito, and Beanstalk

Parameters:
  VpcId: { Type: "AWS::EC2::VPC::Id" }
  Subnets: { Type: "List<AWS::EC2::Subnet::Id>" }
  DBPassword: { Type: String, NoEcho: true }
  EBInstanceType:
    Type: String
    Default: t3.small
    Description: EC2 instance type for Elastic Beanstalk instances
  EnvironmentName:
    Type: String
    Default: karaadi-prod
    Description: Elastic Beanstalk environment name
  AllowedHttpCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR range allowed to access HTTP/HTTPS to EB

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: karaadi-user-pool
      AutoVerifiedAttributes: [email]

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: karaadi-app-client
      UserPoolId: !Ref UserPool

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for RDS
      SubnetIds: !Ref Subnets

  PostgresDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceClass: db.t3.micro
      Engine: postgres
      AllocatedStorage: "20"
      DBInstanceIdentifier: karaadi-postgres
      MasterUsername: postgres
      MasterUserPassword: !Ref DBPassword
      VPCSecurityGroups: [!Ref DBSecurityGroup]
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false

  RedisCache:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      CacheNodeType: cache.t3.micro
      Engine: redis
      NumCacheNodes: 1
      VpcSecurityGroupIds: [!Ref RedisSecurityGroup]
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      ClusterName: karaadi-redis

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: Subnet group for Redis
      SubnetIds: !Ref Subnets

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow access to RDS
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  DBIngressFromEB:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DBSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref EBSecurityGroup

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow access to Redis
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  RedisIngressFromEB:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RedisSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref EBSecurityGroup

  EBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Access for EB instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedHttpCidr
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowedHttpCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EBApp:
    Type: AWS::ElasticBeanstalk::Application
    Properties:
      ApplicationName: karaadi-backend

  EBInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWebTier
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkMulticontainerDocker
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWorkerTier
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess

  EBInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref EBInstanceRole]

  EBServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: elasticbeanstalk.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSElasticBeanstalkEnhancedHealth
        - arn:aws:iam::aws:policy/service-role/AWSElasticBeanstalkManagedUpdatesCustomerRolePolicy

  EBEnv:
    Type: AWS::ElasticBeanstalk::Environment
    Properties:
      ApplicationName: !Ref EBApp
      EnvironmentName: !Ref EnvironmentName
      ServiceRole: !Ref EBServiceRole
      SolutionStackName: "64bit Amazon Linux 2023 v6.1.2 running Node.js 20"
      OptionSettings:
        - Namespace: aws:elasticbeanstalk:container:nodejs
          OptionName: NodeCommand
          Value: npx tsx src/server.ts
        - Namespace: aws:elasticbeanstalk:container:nodejs
          OptionName: NPM_USE_PRODUCTION
          Value: "false"
        - Namespace: aws:ec2:vpc
          OptionName: VPCId
          Value: !Ref VpcId
        - Namespace: aws:ec2:vpc
          OptionName: Subnets
          Value: !Join [",", !Ref Subnets]
        - Namespace: aws:ec2:vpc
          OptionName: ELBSubnets
          Value: !Join [",", !Ref Subnets]
        - Namespace: aws:ec2:vpc
          OptionName: AssociatePublicIpAddress
          Value: "true"
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: IamInstanceProfile
          Value: !Ref EBInstanceProfile
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: InstanceType
          Value: !Ref EBInstanceType
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: SecurityGroups
          Value: !Ref EBSecurityGroup
        - Namespace: aws:autoscaling:asg
          OptionName: MinSize
          Value: "1"
        - Namespace: aws:autoscaling:asg
          OptionName: MaxSize
          Value: "2"
        - Namespace: aws:elasticbeanstalk:environment
          OptionName: EnvironmentType
          Value: SingleInstance
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DATABASE_URL
          Value: !Sub "postgresql://postgres:${DBPassword}@${PostgresDB.Endpoint.Address}:${PostgresDB.Endpoint.Port}/postgres"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: NPM_CONFIG_PRODUCTION
          Value: "false"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: REDIS_HOST
          Value: !GetAtt RedisCache.ConfigurationEndpoint.Address
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: REDIS_PORT
          Value: !GetAtt RedisCache.ConfigurationEndpoint.Port
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: COGNITO_USER_POOL_ID
          Value: !Ref UserPool
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: COGNITO_USER_POOL_CLIENT_ID
          Value: !Ref UserPoolClient

Outputs:
  PostgresEndpoint:
    Description: RDS Postgres endpoint
    Value: !Sub "${PostgresDB.Endpoint.Address}:${PostgresDB.Endpoint.Port}"
    Export:
      Name: !Sub "${AWS::StackName}-postgres-endpoint"
  RedisEndpoint:
    Description: Redis configuration endpoint
    Value: !Sub "${RedisCache.ConfigurationEndpoint.Address}:${RedisCache.ConfigurationEndpoint.Port}"
    Export:
      Name: !Sub "${AWS::StackName}-redis-endpoint"
  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
  EBEnvironmentName:
    Description: Elastic Beanstalk Environment Name
    Value: !Ref EBEnv
